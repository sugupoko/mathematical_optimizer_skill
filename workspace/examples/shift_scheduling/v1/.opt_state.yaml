# --- /opt-assess の出力 ---
assess:
  status: "completed"
  completed_at: "2026-04-07T10:30:00"
  problem_type: "scheduling"
  problem_subtype: "shift_scheduling"
  scale:
    variables: 210
    constraints: 140
    size_class: "small"
  entities:
    - name: "employees"
      count: 10
      source_file: "employees.csv"
    - name: "shifts"
      count: 21
      source_file: "shifts.csv"
    - name: "constraints"
      count: 10
      source_file: "constraints.csv"
  objectives:
    primary: "全シフト枠の必要人数充足（HC1最小化）"
    secondary: "従業員間の勤務時間の公平性（SC2）"
  hard_constraints:
    - id: "HC1"
      description: "1シフトあたりの必要人数を満たすこと"
      source: "R2(shifts.csv), R3(constraints.csv)"
    - id: "HC2"
      description: "従業員の週あたり最大勤務時間を超えないこと"
      source: "R1(employees.csv), R3"
    - id: "HC3"
      description: "従業員の利用不可日にはシフトを割り当てないこと"
      source: "R1, R3"
    - id: "HC4"
      description: "シフトに必要なスキルを持つ従業員のみ割り当てること"
      source: "R1, R2, R3"
    - id: "HC5"
      description: "夜勤の翌日に朝勤を割り当てないこと（最低11時間の休息）"
      source: "R3"
  soft_constraints:
    - id: "SC1"
      description: "連続勤務は最大5日まで"
      weight: 25
    - id: "SC2"
      description: "勤務時間の偏り最小化（公平性）"
      weight: 50
    - id: "SC3"
      description: "最低勤務時間の確保"
      weight: 30
    - id: "SC4"
      description: "夜勤は週2回以下"
      weight: 20
    - id: "SC5"
      description: "研修スキル者を各日配置"
      weight: 15
  hypotheses:
    - "ボトルネックは供給量そのもの（需要48 > 供給46）"
    - "夜勤が最も充足困難（HC5で翌日の自由度低下）"
    - "土日が特にタイト（不可日の従業員が多い）"
    - "公平性と充足率はトレードオフ"
  assumptions:
    - key: "1日1シフト"
      value: 1
      unit: "shifts/day"
      confidence: "medium"
      note: "一般的な慣例、未確認"
    - key: "シフト時間"
      value: 8
      unit: "hours"
      confidence: "high"
      note: "shifts.csvから算出"
  missing_data:
    - "従業員の希望シフト"
    - "過去の実績データ"
    - "急な欠勤の頻度"
  data_quality:
    overall: "良好"
    issues:
      - "供給不足（需要384h > 供給368h）が構造的問題"

