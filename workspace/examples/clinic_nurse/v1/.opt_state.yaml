version: 1
project_name: "clinic_nurse_example"
created_at: "2026-04-11T00:00:00"
updated_at: "2026-04-11T00:00:00"

assess:
  status: "completed"
  completed_at: "2026-04-11T00:00:00"
  problem_type: "scheduling"
  problem_subtype: "multi_clinic_nurse_rostering"
  scale:
    variables: 1296
    hc_count: 8
    sc_count: 6
    size_class: "medium-to-large"
  complexity:
    overall: "complex"
    axes:
      variables: "complex"       # 1296 > 1000
      hc_count: "medium"         # 8 (in 6-10 range)
      problem_type: "complex"    # composite: multi-clinic + cert + senior
      interaction: "complex"     # cert × senior × rest × home_clinic strongly coupled
      domain: "medium"           # extended NRP
    rationale: "1,296 decision variables, 3 clinics × 8 HCs with strong interaction between cert matching, senior placement, and home_clinic preference. Requires staged baseline."
    recommended_approach: "staged"
  entities:
    - name: "nurses"
      count: 18
      source_file: "nurses.csv"
    - name: "clinics"
      count: 3
      source_file: "clinics.csv"
    - name: "shifts"
      count: 72
      source_file: "shifts.csv"
  objectives:
    primary: "Feasibility: satisfy all HC1-HC8"
    secondary: "SC1-SC6 overall score maximization"
  hard_constraints:
    - id: "HC1"
      description: "Each shift has required number of nurses"
      ref: "R3,R4"
    - id: "HC2"
      description: "Nurse weekly hours <= max_hours"
      ref: "R1,R4"
    - id: "HC3"
      description: "No assignment on unavailable days"
      ref: "R1,R4"
    - id: "HC4"
      description: "Nurse must have required certifications"
      ref: "R1,R3,R4"
    - id: "HC5"
      description: "No morning after evening (11h rest)"
      ref: "R4"
    - id: "HC6"
      description: "At most 1 shift per day per nurse"
      ref: "R4"
    - id: "HC7"
      description: "senior_required=1 shifts must have >=1 senior"
      ref: "R3,R4"
    - id: "HC8"
      description: "No multi-clinic assignment same day"
      ref: "R4"
  soft_constraints:
    - id: "SC1"
      description: "Max 5 consecutive work days"
    - id: "SC2"
      description: "Minimize nurse hours fairness (std_dev)"
    - id: "SC3"
      description: "Meet min_hours_per_week"
    - id: "SC4"
      description: "Prefer home_clinic assignment"
    - id: "SC5"
      description: "Fair weekend distribution"
    - id: "SC6"
      description: "Evening shifts <= 6 per 2 weeks"
  supply_demand:
    total_demand_nurse_shifts: 144
    supply_upper_bound: 172
    utilization: 0.837
    slack_ratio: 0.163
  hypotheses:
    - "Feasibility achievable (16% slack in supply)"
    - "HC7 (senior coverage) may be locally tight: 36 shifts / 6 seniors"
    - "HC4 cert requirements easily satisfied (8/6/6 capable vs 4 each)"
    - "SC4 home_clinic is the softest constraint (will be sacrificed first)"
  assumptions:
    - key: "shift_as_unit"
      value: "1 nurse = 1 shift unit per day"
      ref: "R5"
      confidence: "high"
    - key: "multi_clinic_week"
      value: "allowed across days within week"
      ref: "R5"
      confidence: "medium"
      note: "HC8 only prohibits same-day multi-clinic"
    - key: "travel_time"
      value: "not considered"
      ref: "R5"
      confidence: "medium"
    - key: "nurse_preferences"
      value: "not considered (v1)"
      ref: "R5"
      confidence: "low"
  data_quality:
    overall: "良好"
    issues: []

