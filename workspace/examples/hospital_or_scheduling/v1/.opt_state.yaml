    - surgeon_S01_cardiac
    - or5_pediatric_day1_2
    - neuro_day1
    - vascular_urgent

baseline:
  script: scripts/staged_baseline.py
  phases: 11
  first_infeasible: null
  final_status: OPTIMAL
  final_scheduled: 50
  final_hc_ok: 22
  time_limit_sec: 120
  workers: 4
  report: reports/baseline_report.md
  results: results/baseline_results.json

