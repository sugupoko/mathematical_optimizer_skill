  report: reports/improve_report.md
  results: results/improve_results.json

variants:
  script: scripts/variants.py
  profiles: 5
  all_feasible: true
  results: results/variants_results.json

proposal:
  report: reports/proposal.md
  audience: hospital_director
  ask: approve_balanced_profile

next_actions:
