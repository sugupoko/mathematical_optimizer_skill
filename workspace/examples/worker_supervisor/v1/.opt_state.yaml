      added: HC11_HC12_pair
      status: INFEASIBLE
      feasible: false
      cumulative_constraints: 1040
      time_sec: 0.01
  first_infeasible_phase: 5
  bottleneck:
    constraints: [HC1, HC7, HC8]
    root_cause: |
      reception+bilingual シフト (8 シフト中 4 つ) は 5 名/シフト必要だが、
      en + reception スキルを両方持つ作業者は 4 名 (W002,W004,W008,W010) しかいない。
      プール不足による構造的不可能性。
  recommendations:
    short_term:
      - relax_HC1_for_reception_bilingual_shifts
      - or_relax_HC7_skill_for_bilingual_shifts
    mid_term:
      - hire_one_more_en_reception_worker
      - clarify_Q5_bilingual_scope
