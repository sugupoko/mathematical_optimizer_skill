baseline:
  status: "completed"
  completed_at: "2026-04-11T00:00:00"
  strategy: "staged"
  time_limit_per_phase_sec: 60
  num_workers: 4
  independent_hc_verifier: true
  first_infeasible_phase: "Phase5_HC7_HC8"
  all_phases_feasible: false
  phases_summary:
    # active_ok = Phase 強制 HC を全て満たしているか (ソルバーの正しさ検証)
    # pending = 未追加 HC の違反数 (後の Phase で解消見込み)
    Phase0_vars_only: {adds: [],             status: OPTIMAL,    active_ok: true, pending: 88,  time: 0.04}
    Phase1_HC1:       {adds: [HC1],          status: OPTIMAL,    active_ok: true, pending: 135, time: 0.01}
    Phase2_HC2:       {adds: [HC2],          status: OPTIMAL,    active_ok: true, pending: 116, time: 0.01}
    Phase3_HC3_HC4:   {adds: [HC3, HC4],     status: OPTIMAL,    active_ok: true, pending: 88,  time: 0.04}
    Phase4_HC5_HC6:   {adds: [HC5, HC6],     status: OPTIMAL,    active_ok: true, pending: 70,  time: 0.03}
    Phase5_HC7_HC8:   {adds: [HC7, HC8],     status: INFEASIBLE, active_ok: null, pending: null, time: 0.01}
    Phase6_HC9_HC10:  {adds: [HC9, HC10],    status: INFEASIBLE, active_ok: null, pending: null, time: 0.01}
    Phase7_FULL:      {adds: [HC11, HC12],   status: INFEASIBLE, active_ok: null, pending: null, time: 0.01}
  root_cause:
    bottleneck_constraints: ["HC1", "HC7", "HC8"]
    description: "鳩の巣原理: en+reception 候補 4 名 vs 需要 5 名/シフト × 4 シフト"
    evidence:
      en_reception_workers: 4
      worker_ids: ["W002", "W004", "W008", "W010"]
      affected_shifts: 4
      demand_per_shift: 5
      shortage_per_shift: 1
    exonerated:
      - "HC9, HC10 (rest) — Phase 5 で既に壁のため評価不可"
      - "HC11 (forbidden) — 2件のみ、鳩の巣とは無関係"
      - "HC12 (mentorship) — 4件、2週間達成は容易"
  solution_options:
    A_input_change:
      A1: "W021 (en+reception) を 1 名追加採用 — 人件費、1-2ヶ月"
      A2: "W013/W017 に reception 研修 — 研修費、2-3ヶ月"
      A3: "reception 保持者に英語研修 — 研修費+時間、6ヶ月以上"
    B_spec_change:
      B1: "HC1 緩和 (bilingual+reception で 5→4) — 0円、顧客合意"
      B2: "HC8 解釈変更 (最低1名 en) — 0円、Q5 確認必須"
      B3: "HC1 soft 化 (penalty 付き shortage 許容) — 0円"
    C_operations_change:
      C1: "bilingual 需要の時間帯再配置 — 顧客導線変更"
      C2: "一時派遣で補う — 外注費"
  recommendation: "即時 Q5 確認 (B2 可能性) → 不可なら B1 暫定 + A1 採用進行"
  scripts:
    - path: "scripts/staged_baseline.py"

