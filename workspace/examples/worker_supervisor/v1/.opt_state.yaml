baseline:
  status: "completed"
  completed_at: "2026-04-11T00:00:00"
  strategy: "staged"
  time_limit_per_phase_sec: 60
  num_workers: 4
  independent_hc_verifier: true
  first_infeasible_phase: "Phase5_HC7_HC8"
  all_phases_feasible: false
  phases_summary:
    Phase0_vars_only:  {status: OPTIMAL, w: 0,   v: 0,  feasible: true,  time: 0.03}
    Phase1_HC1:        {status: OPTIMAL, w: 160, v: 0,  feasible: true,  time: 0.01}
    Phase2_HC2:        {status: OPTIMAL, w: 160, v: 46, feasible: true,  time: 0.01}
    Phase3_HC3_HC4:    {status: OPTIMAL, w: 160, v: 46, feasible: true,  time: 0.04}
    Phase4_HC5_HC6:    {status: OPTIMAL, w: 160, v: 46, feasible: true,  time: 0.02}
    Phase5_HC7_HC8:    {status: INFEASIBLE, feasible: false, time: 0.00}
    Phase6_HC9_HC10:   {status: INFEASIBLE, feasible: false, time: 0.00}
    Phase7_FULL:       {status: INFEASIBLE, feasible: false, time: 0.01}
  root_cause:
    bottleneck_constraints: ["HC7", "HC8"]
    description: "鳩の巣原理: en+reception の作業者 4名 vs bilingual+reception シフトの需要 5名/シフト"
    evidence:
      en_reception_workers: 4
      worker_ids: ["W002", "W004", "W008", "W010"]
      bilingual_reception_shifts: 4
      demand_per_shift: 5
      shortage: 1
    exonerated:
      - "HC9, HC10 (rest) - Phase 6 未到達で容疑外"
      - "HC11 (forbidden) - 2件のみ、影響小"
      - "HC12 (mentorship) - 4件、2週間での達成は容易"
  solution_options:
    A_input_change:
      - "A1: en+reception 作業者を1名追加採用 (推奨、恒久対策)"
      - "A2: 既存作業者に英語研修 (時間かかる)"
      - "A3: W013/W017 に reception 研修"
    B_spec_change:
      - "B1: HC1 を bilingual+reception で 5→4 に緩和 (暫定運用)"
      - "B2: HC8 ソフト化 (非英語可を許容)"
      - "B3: HC8 解釈を『最低1名 en』に変更 (Q5 確認必須)"
    C_operations_change:
      - "C1: bilingual 需要を別時間帯に分散"
      - "C2: 外注/一時派遣で補う"
  recommendation: "短期 B1 暫定運用 + 中期 A1 採用。並行して Q5 で B3 確認。"
  scripts:
    - path: "scripts/staged_baseline.py"

