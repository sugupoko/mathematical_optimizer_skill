version: 1
project_name: "delivery_routing_example"
created_at: "2026-03-30T08:00:00"
updated_at: "2026-03-30T15:30:00"

assess:
  status: "completed"
  completed_at: "2026-03-30T09:00:00"
  problem_type: "vrp"
  problem_subtype: "cvrptw"
  scale:
    variables: 60  # 20 customers x 3 vehicles
    constraints: 46  # 20 TW + 3 capacity + 3 max_hours + 20 visit
    size_class: "small"
  entities:
    - name: "customers"
      count: 20
      source_file: "customers.csv"
    - name: "vehicles"
      count: 3
      source_file: "vehicles.csv"
    - name: "depot"
      count: 1
      source_file: "depot.csv"
  objectives:
    primary: "総走行コストの最小化"
    secondary: "全顧客への配送（カバー率最大化）"
  hard_constraints:
    - id: "HC1"
      description: "各車両の積載量を超えない"
      source: "vehicles.csv"
    - id: "HC2"
      description: "各顧客の時間枠内に到着する"
      source: "customers.csv"
    - id: "HC3"
      description: "各車両の最大稼働時間を超えない"
      source: "vehicles.csv"
  soft_constraints:
    - id: "SC1"
      description: "全顧客に配送する（未配送を最小化）"
      weight: 100
    - id: "SC2"
      description: "総走行距離を最小化"
      weight: 1
  hypotheses:
    - "容量不足(815kg > 750kg)が最大のボトルネック。1便では全顧客配送不可能"
    - "時間枠は比較的余裕があり（平均216分）、ルート最適化の自由度は高い"
    - "V003(200kg/6h)の制約が厳しく、担当可能な顧客数が限定される"
    - "AM/PM分割による2便運行で全顧客カバーが可能"
  assumptions:
    - key: "travel_speed"
      value: 30
      unit: "km/h"
      confidence: "medium"
      note: "市街地の平均速度。渋滞未考慮"
    - key: "road_factor"
      value: 1.3
      unit: "倍"
      confidence: "medium"
      note: "直線距離→道路距離の変換係数"
    - key: "service_time"
      value: "10-25"
      unit: "minutes"
      confidence: "high"
      note: "顧客ごとにデータ記載あり"
  missing_data:
    - "渋滞による移動時間の変動"
    - "荷物の体積（体積制約の有無）"
    - "曜日による需要変動"
    - "不在時の再配達ルール"
  data_quality:
    overall: "良好"
    issues:
      - "移動時間は一律30km/hで計算。実績データによる検証が必要"

baseline:
  status: "completed"
  completed_at: "2026-03-30T11:00:00"
  results:
    random:
      feasible: false
      total_distance_km: 173.37
      total_cost_yen: 19043
      tw_violations: 2
      capacity_violations: 2
      unvisited: 0
      note: "全顧客訪問するが容量・時間枠で違反多数"
    nearest_neighbor:
      feasible: false
      total_distance_km: 93.0
      total_cost_yen: 10126
      tw_violations: 2
      capacity_violations: 0
      unvisited: 2
      note: "C014, C020が未配送。TW違反2件"
    ortools_solver:
      feasible: false
      total_distance_km: 84.48
      total_cost_yen: 9508
      tw_violations: 0
      capacity_violations: 0
      unvisited: 1
      note: "C018(80kg)が未配送。配送した19顧客は全制約充足"
  best_baseline: "ortools_solver"
  bottlenecks:
    - "HC1: 構造的容量不足（815kg > 750kg、最低1顧客が未配送）"
    - "V003の容量/稼働時間が小さく、割当可能な顧客が限定的"
    - "早朝時間枠（C010: 08:00-10:00等）がルート構成の自由度を制限"
  scripts:
    - path: "scripts/solve_all.py"

improve:
  status: "completed"
  iterations:
    - iteration: 1
      completed_at: "2026-03-30T14:00:00"
      strategy: "AM/PM分割（V003を2便運行）"
      pattern_ref: "improvement_patterns.md#パターン5"
      result:
        feasible: true
        total_distance_km: 105.77
        total_cost_yen: 11709
        tw_violations: 0
        capacity_violations: 0
        unvisited: 0
        vs_baseline: "全20顧客カバー達成（+1顧客）、コスト+23.2%"
      what_worked: "V003のAM/PM分割で実質容量を拡大。お台場モール(80kg)を午後便で配送"
      remaining_issues:
        - "走行距離+25.2%（デポ往復1回増加分）"
        - "渋滞の影響が未考慮"
        - "V003ドライバーの2便運行による負荷"
  best:
    iteration: 1
    method: "OR-Tools + AM/PM分割（V003: 2便運行）"
    feasible: true
    total_distance_km: 105.77
    total_cost_yen: 11709
    customers_served: 20
    vs_baseline: "未配送0（ベースライン比+1顧客）、コスト+2,201円/日"
  additional_data_needed:
    - "渋滞データ（午後便の遅延リスク評価用）"
    - "V003ドライバーの休憩時間ルール"

report:
  status: "completed"
  completed_at: "2026-03-30T15:00:00"
  output_file: "reports/v1_proposal.md"
  files:
    - "reports/assess_report.md"
    - "reports/baseline_report.md"
    - "reports/improve_report.md"
    - "reports/v1_proposal.md"
  proposals:
    - id: "A"
      description: "AM/PM分割（V003の2便運行）"
      cost: "+2,201円/日（約44,020円/月）"
      effect: "全20顧客への配送を達成"
      difficulty: "すぐできる"
      recommended: true
    - id: "B"
      description: "V003を大型車（300kg級）に入替"
      cost: "月額リース差額"
      effect: "1便で全顧客カバー可能"
      difficulty: "要見積り（中期）"
      recommended: false
    - id: "C"
      description: "現状のまま（1便運行）"
      cost: "なし"
      effect: "1顧客が常に未配送"
      difficulty: "-"
      recommended: false

deploy:
  status: "completed"
  completed_at: "2026-03-30T17:00:00"
  execution_frequency: "daily"
  schedule: "毎朝06:00"
  pipeline_script: "scripts/run_pipeline.py"
  design_doc: "reports/deploy_design.md"
  pipeline_steps:
    - "データ取得（depot/customers/vehicles CSV）"
    - "距離行列構築"
    - "バリデーション"
    - "AM/PM分割 + OR-Tools Routing最適化"
    - "結果検証"
    - "ルートJSON + 配送指示書出力"
  monitoring_metrics:
    - "配送完了率"
    - "時間枠違反"
    - "容量超過"
    - "総走行距離"
  fallback_plan: "最近傍法 → 前日ルート → 手動作成"

assumptions:
  - "移動速度: 30 km/h (渋滞未考慮)"
  - "道路係数: 1.3"
  - "デポ出発: 08:00 (AM), 12:30 (PM)"
  - "合成データ使用"

data_files:
  - "data/depot.csv"
  - "data/customers.csv"
  - "data/vehicles.csv"

result_files:
  - "results/analysis.json"
  - "results/all_results.json"
