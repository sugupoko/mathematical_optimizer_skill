project: delivery_routing_example
version: v1
created: "2026-03-30"
updated: "2026-03-30"

problem:
  type: CVRPTW
  description: "品川デポから都内20顧客への配送ルート最適化"
  num_customers: 20
  num_vehicles: 3
  total_demand_kg: 815
  total_capacity_kg: 750
  capacity_sufficient: false

phases:
  assess:
    status: done
    findings:
      - "容量不足: 815kg > 750kg (65kg超過)"
      - "時間枠は比較的余裕あり（最小120分）"
      - "V003の制約が最も厳しい（200kg/6h）"
    report: reports/assess_report.md

  baseline:
    status: done
    methods:
      - name: random
        distance_km: 173.37
        cost_yen: 19043
        tw_violations: 2
        cap_violations: 2
        unvisited: 0
      - name: nearest_neighbor
        distance_km: 93.0
        cost_yen: 10126
        tw_violations: 2
        cap_violations: 0
        unvisited: 2
      - name: ortools_single
        distance_km: 84.48
        cost_yen: 9508
        tw_violations: 0
        cap_violations: 0
        unvisited: 1
    bottleneck: "容量不足により全顧客への1便配送は不可能"
    report: reports/baseline_report.md

  improve:
    status: done
    method: ampm_split
    description: "AM/PM 2便制: 時間枠中間値で顧客を分割し各便を個別に最適化"
    result:
      distance_km: 105.77
      cost_yen: 11709
      tw_violations: 0
      cap_violations: 0
      unvisited: 0
    improvement: "未訪問 1→0 (配送完了率100%達成)"
    report: reports/improve_report.md

  report:
    status: done
    report: reports/v1_proposal.md

  deploy:
    status: pending

assumptions:
  - "移動速度: 30 km/h (渋滞未考慮)"
  - "道路係数: 1.3"
  - "デポ出発: 08:00 (AM), 12:30 (PM)"
  - "合成データ使用"

data_files:
  - data/depot.csv
  - data/customers.csv
  - data/vehicles.csv

result_files:
  - results/analysis.json
  - results/all_results.json

scripts:
  - scripts/solve_all.py
